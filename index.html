<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HS Mobília | Alta Decoração</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="module" src="./index.js" defer></script>
</head>

<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="./index.html" class="brand">
        <span class="brand-text">HS Mobília</span>
      </a>
      <nav class="main-nav">
        <a href="./index.html">Acervo</a>
        <a href="./arquiteto.html">Profissionais</a>
        <a href="./admin.html">Curadoria</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Onde o design encontra a permanência.</h1>
      <p>Mobiliário autoral de alto padrão para ambientes que inspiram sofisticação e conforto absoluto.</p>
      <a href="#acervo" class="btn">Explorar Coleção</a>
    </div>
  </section>

  <main id="acervo" class="section">
    <div class="container">
      <div class="section-title">
        <span>Coleção Exclusiva</span>
        <h2>Nosso Acervo</h2>
      </div>

      <div id="public-status"
        style="text-align:center; font-size: 0.8rem; letter-spacing: 2px; color: var(--color-text-light); margin-bottom: 2rem;">
      </div>

      <!-- NOVA BARRA DE FILTROS -->
      <div class="filter-section">
        <div class="filter-bar">
          <div class="filter-group">
            <select id="filter-category" aria-label="Filtrar por Categoria">
              <option value="">Todas as Categorias</option>
              <!-- O JS vai injetar o resto aqui -->
            </select>

            <select id="filter-brand" aria-label="Filtrar por Marca">
              <option value="">Todas as Marcas</option>
              <!-- O JS vai injetar o resto aqui -->
            </select>
          </div>
          
          <div class="search-group">
            <input type="text" id="search-input" placeholder="Buscar por nome..." autocomplete="off" />
          </div>
        </div>
      </div>
      <!-- FIM DA BARRA DE FILTROS -->

      <div id="public-products" class="product-grid" aria-live="polite">
      </div>
    </div>
  </main>

</body>

</html>
